<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remix: The Grand Scholar's University Portal</title>
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/graduation-cap.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 3 CDN (Configured for your Theme) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ["Playfair Display", "Georgia", "serif"],
                        sans: ["Inter", "system-ui", "sans-serif"],
                        display: ["Montserrat", "sans-serif"],
                    },
                    colors: {
                        'bg-dark': '#05070a',
                        'bg-panel': '#0f172a',
                        'text-main': '#f8fafc',
                        'text-muted': '#94a3b8',
                        'accent-gold': '#d4af37',
                        'accent-gold-hover': '#f1c40f',
                        'success-dark': '#064e3b',
                        'success-light': '#10b981',
                        'danger-dark': '#7f1d1d',
                        'danger-light': '#ef4444',
                        'border-subtle': 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Premium Background & UI from your index.css */
        body {
            background-color: #05070a;
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(30, 41, 59, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(15, 23, 42, 0.4) 0%, transparent 50%),
                linear-gradient(to bottom, #05070a, #0f172a);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        .btn-premium {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #05070a;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        }

        .pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #05070a; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #1e293b, #d4af37);
            border-radius: 4px;
        }

        .markdown-body {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #f8fafc;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .markdown-body blockquote {
            border-left: 4px solid #d4af37;
            padding-left: 1rem;
            font-style: italic;
            background: rgba(255,255,255,0.03);
            margin: 1rem 0;
        }
    </style>

    <!-- Import Map for Browser Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "motion/react": "https://esm.sh/motion@12/react",
        "lucide-react": "https://esm.sh/lucide-react@0.475.0",
        "react-markdown": "https://esm.sh/react-markdown@10",
        "@google/genai": "https://esm.sh/@google/genai@1.45.0",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.4"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'motion/react';
        import { 
            BookOpen, GraduationCap, CheckCircle2, ChevronRight, Layout, PenTool, 
            Mic2, Search, Home, ArrowLeft, Trophy, Send, User, Bot, Sparkles, 
            Menu, X, History, Plus, Volume2, Check, AlertCircle, Lock, ArrowRight,
            Bell, ExternalLink, MapPin, Phone, Facebook, Twitter, Instagram, Github
        } from 'lucide-react';
        import Markdown from 'react-markdown';
        import { GoogleGenAI } from "@google/genai";
        import confetti from 'canvas-confetti';

        // --- CONSTANTS & DATA ---
        const MODULES = [
          {
            id: "grammar",
            title: "Advanced Grammar",
            icon: "🖋️",
            description: "First-year university level syntax, morphology, mechanics, and style.",
            lessons: [
              {
                id: "modal-verbs",
                title: "Modal Verbs",
                content: "Modal verbs like 'can', 'could', 'may', 'might', 'must', 'shall', 'should', 'will', and 'would' express possibility, necessity, or permission.\n\nExample: You must study hard for the exam."
              },
              {
                id: "past-perfect",
                title: "Past Perfect Tenses",
                content: "The Past Perfect is used to show that an action happened before another action in the past. Structure: had + past participle.\n\nExample: When I arrived at the station, the train had already left."
              }
            ],
            quizzes: [
              {
                id: "gram_1",
                title: "Morphology & Parts of Speech",
                questions: [
                  { text: "In the sentence 'Running is excellent cardiovascular exercise,' what part of speech is the word 'Running'?", options: ["Present participle", "Gerund (Noun)", "Action verb", "Adjective"], answer: 1 },
                  { text: "Which of the following sentences contains an intransitive verb?", options: ["She threw the ball.", "He built a house.", "The sun rises in the east.", "They painted the wall."], answer: 2 },
                  { text: "Identify the subordinating conjunction in this sentence: 'We will stay indoors until the storm passes.'", options: ["will", "indoors", "until", "passes"], answer: 2 },
                  { text: "What is the function of the word 'surprisingly' in the phrase 'surprisingly fast runner'?", options: ["It modifies the noun 'runner'.", "It acts as a preposition.", "It modifies the adjective 'fast'.", "It functions as a linking verb."], answer: 2 },
                  { text: "In linguistics, what do we call a morpheme that cannot stand alone as an independent word, such as the 'un-' in 'unhappy'?", options: ["Free morpheme", "Bound morpheme", "Root word", "Lexeme"], answer: 1 }
                ]
              }
            ]
          },
          {
            id: "culture",
            title: "Computing & Internet History",
            icon: "🌐",
            description: "From early mechanical calculators to ARPANET and the World Wide Web.",
            lessons: [],
            quizzes: [
              {
                id: "cult_1",
                title: "Early Theoretical Computing",
                questions: [
                  { text: "Charles Babbage designed a massive, steam-powered mechanical computer in 1837. What was it called?", options: ["The Difference Engine", "The Antikythera Mechanism", "The Analytical Engine", "The Turing Machine"], answer: 2 },
                  { text: "Who is widely recognized as the first computer programmer for her work on Babbage's machine?", options: ["Grace Hopper", "Katherine Johnson", "Margaret Hamilton", "Ada Lovelace"], answer: 3 }
                ]
              }
            ]
          },
          {
            id: "literature",
            title: "Literature & Language",
            icon: "📚",
            description: "EBSCO-sourced Poetics, Prose, Drama, and Literary Devices.",
            lessons: [],
            quizzes: [
              {
                id: "lit_1",
                title: "Literary Terms & Genres",
                questions: [
                  { text: "Which term describes a narrative poem that is originally meant to be sung?", options: ["Sonnet", "Haiku", "Ballad", "Elegy"], answer: 2 },
                  { text: "In literature, what does 'bildungsroman' refer to?", options: ["A tragic ending", "A coming-of-age story", "A story within a story", "A strictly historical account"], answer: 1 }
                ]
              }
            ]
          }
        ];

        // --- SOUND SYSTEM ---
        let audioCtx = null;
        const initAudio = () => {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          return audioCtx;
        };

        const playSound = (type) => {
          const ctx = initAudio();
          const now = ctx.currentTime;
          
          if (type === 'ambient') {
            const buffer = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const source = ctx.createBufferSource();
            source.buffer = buffer; source.loop = true;
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.015, now + 5);
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(100, now);
            source.connect(filter).connect(gain).connect(ctx.destination);
            source.start();
            return;
          }

          const createOsc = (freq, duration, gainVal = 0.05) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain).connect(ctx.destination);
            osc.frequency.setValueAtTime(freq, now);
            gain.gain.setValueAtTime(gainVal, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.start(); osc.stop(now + duration);
          };

          if (type === 'click') createOsc(800, 0.1);
          if (type === 'success') createOsc(600, 0.4);
          if (type === 'error') createOsc(150, 0.3, 0.1);
          if (type === 'relic') { createOsc(400, 1); createOsc(600, 1.2); }
        };

        // --- COMPONENTS ---
        const Logo = ({ className }) => (
          <svg viewBox="0 0 200 200" fill="none" className={className}>
            <circle cx="100" cy="100" r="95" fill="#1B4332" fillOpacity="0.05" />
            <path d="M100 10 A 90 90 0 1 1 90 10" stroke="#1B4332" strokeWidth="1" fill="none" />
            <g transform="translate(100, 100)">
                <path d="M0 -70 C 15 -70, 35 -30, 35 10 L 25 70 L -25 70 L -35 10 C -35 -30, -15 -70, 0 -70 Z" fill="#1B4332" stroke="#D4AF37" strokeWidth="2" />
                <line x1="0" y1="-70" x2="0" y2="-10" stroke="#D4AF37" strokeWidth="1.5" strokeLinecap="round" />
            </g>
          </svg>
        );

        const ThreeDIcon = ({ icon: Icon, size = 24, color = "currentColor", className = "" }) => (
          <motion.div
            className={`relative inline-flex items-center justify-center ${className}`}
            whileHover={{ rotateX: 15, rotateY: 15, scale: 1.1, z: 50 }}
            transition={{ type: "spring", stiffness: 300, damping: 10 }}
            style={{ perspective: "1000px", transformStyle: "preserve-3d" }}
          >
            <Icon size={size} className="absolute opacity-20 blur-[2px] translate-y-1 translate-x-1" style={{ color: "black" }} />
            <Icon size={size} style={{ color }} className="relative z-10" />
          </motion.div>
        );

        const Header = ({ user, onToggleSidebar }) => (
          <header className="sticky top-0 z-40 w-full glass-panel border-b border-border-subtle">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                <div className="flex items-center gap-4">
                  <motion.button onClick={onToggleSidebar} className="p-2 rounded-xl hover:bg-white/5 lg:hidden">
                    <Menu size={24} className="text-accent-gold" />
                  </motion.button>
                  <div className="flex items-center gap-3">
                    <ThreeDIcon icon={GraduationCap} size={32} color="#d4af37" />
                    <div>
                      <h1 className="text-xl font-display font-bold tracking-tight">THE SCHOLAR'S PORTAL</h1>
                      <p className="hidden sm:block text-[10px] font-sans text-accent-gold uppercase tracking-[0.2em] opacity-80">FLSHM Mohammedia - English Studies</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                    <span className="hidden sm:inline text-xs font-mono text-accent-gold/60 tracking-widest">{new Date().toLocaleDateString()}</span>
                    {user ? (
                        <div className="flex items-center gap-3 border-l border-border-subtle pl-4">
                            <span className="hidden md:block text-sm font-bold">{user.name}</span>
                            <div className="w-10 h-10 rounded-full border border-accent-gold flex items-center justify-center bg-bg-panel">
                                <User size={18} className="text-accent-gold" />
                            </div>
                        </div>
                    ) : (
                        <button className="btn-premium px-6 py-2 rounded-full text-sm font-bold">Sign In</button>
                    )}
                </div>
              </div>
            </div>
          </header>
        );

        const LoginPortal = ({ onLogin }) => {
          const [name, setName] = useState("");
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-bg-dark/95 backdrop-blur-md">
                <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="glass-panel w-full max-w-md p-10 rounded-[2rem] text-center">
                    <Logo className="w-24 h-24 mx-auto mb-8" />
                    <h2 className="text-3xl font-display font-bold mb-2">Welcome, Scholar</h2>
                    <p className="text-text-muted mb-8 italic">Semester 2 Academic Gateway</p>
                    <input 
                        type="text" value={name} onChange={e => setName(e.target.value)}
                        placeholder="Enter Your Full Name"
                        className="w-full bg-bg-dark border border-border-subtle rounded-2xl p-4 mb-6 focus:outline-none focus:border-accent-gold transition-all"
                    />
                    <button 
                        onClick={() => { if(name) { playSound('relic'); onLogin({ name, role: 'Scholar' }); }}}
                        className="btn-premium w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2"
                    >
                        Access Archives <ArrowRight size={20} />
                    </button>
                </motion.div>
            </div>
          );
        };

        const Footer = () => (
          <footer className="border-t border-border-subtle bg-bg-dark py-12 px-8 mt-20">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                <div className="flex items-center gap-3">
                    <GraduationCap className="text-accent-gold" size={24} />
                    <span className="font-display font-bold tracking-widest text-sm">FLSHM ACADEMY</span>
                </div>
                <div className="flex gap-6 text-text-muted text-xs font-mono">
                    <span className="hover:text-accent-gold cursor-pointer transition-colors">ARCHIVES</span>
                    <span className="hover:text-accent-gold cursor-pointer transition-colors">PRIVACY</span>
                    <span className="hover:text-accent-gold cursor-pointer transition-colors">SUPPORT</span>
                </div>
                <p className="text-[10px] text-text-muted italic">Built with Honor for FLSHM Students.</p>
            </div>
          </footer>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
          const [user, setUser] = useState(null);
          const [messages, setMessages] = useState([{ role: 'model', content: "Welcome, Scholar. I am your academic assistant. How may I assist your FLSHM Semester 2 studies today?" }]);
          const [input, setInput] = useState("");
          const [isLoading, setIsLoading] = useState(false);
          const [activeModule, setActiveModule] = useState(MODULES[0]);
          const [activeQuiz, setActiveQuiz] = useState(null);
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);

          const canvasRef = useRef(null);
          
          // Background Animation
          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            
            const init = () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                particles = Array.from({length: 40}, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    s: Math.random() * 8 + 4,
                    vx: Math.random() * 0.4 - 0.2, vy: Math.random() * -0.5 - 0.2,
                    char: ['∑', 'π', '∞', 'Ω', '∫'][Math.floor(Math.random()*5)]
                }));
            };

            const animate = () => {
                ctx.clearRect(0, 0, w, h);
                ctx.font = '12px serif';
                ctx.fillStyle = 'rgba(212, 175, 55, 0.15)';
                particles.forEach(p => {
                    ctx.fillText(p.char, p.x, p.y);
                    p.x += p.vx; p.y += p.vy;
                    if(p.y < 0) p.y = h;
                });
                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', init);
            init(); animate();
          }, []);

          const sendMessage = async () => {
            if(!input.trim() || isLoading) return;
            playSound('click');
            const userMsg = { role: 'user', content: input };
            setMessages(prev => [...prev, userMsg]);
            setInput("");
            setIsLoading(true);

            try {
              // Note: For actual GitHub use, you'd need users to provide their own key or use a proxy
              const apiKey = localStorage.getItem('GEMINI_API_KEY') || "";
              if (!apiKey) {
                const key = prompt("Please provide your Gemini API Key to talk to the Tutor (it stays on your device):");
                if (key) localStorage.setItem('GEMINI_API_KEY', key);
              }
              
              const genAI = new GoogleGenAI(localStorage.getItem('GEMINI_API_KEY') || "");
              const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
              
              const result = await model.generateContent(`System: You are an FLSHM university tutor. Modules: ${JSON.stringify(MODULES)}. Context: ${input}`);
              const text = result.response.text();
              setMessages(prev => [...prev, { role: 'model', content: text }]);
            } catch (e) {
              setMessages(prev => [...prev, { role: 'model', content: "Error connecting to the AI hub. Please check your API key in the settings." }]);
            } finally {
              setIsLoading(false);
            }
          };

          if (!user) return <LoginPortal onLogin={(u) => { playSound('ambient'); setUser(u); }} />;

          return (
            <div className="min-h-screen flex flex-col font-sans">
              <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none -z-1" />
              
              <Header user={user} onToggleSidebar={() => setIsSidebarOpen(!isSidebarOpen)} />

              <main className="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-8 flex flex-col lg:flex-row gap-8">
                
                {/* Left: Sidebar & Modules */}
                <aside className={`fixed inset-y-0 left-0 z-50 w-72 glass-panel p-6 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:relative lg:translate-x-0 transition-transform duration-300 lg:z-0 lg:bg-transparent lg:border-none lg:shadow-none`}>
                   <div className="flex justify-between items-center mb-8 lg:hidden">
                       <span className="font-bold text-accent-gold">MENU</span>
                       <X onClick={() => setIsSidebarOpen(false)} />
                   </div>
                   
                   <h3 className="text-[10px] font-display font-bold uppercase tracking-[0.3em] text-accent-gold mb-6 opacity-60">Study Tracks</h3>
                   <div className="space-y-3">
                       {MODULES.map(m => (
                           <div 
                            key={m.id}
                            onClick={() => { playSound('click'); setActiveModule(m); setIsSidebarOpen(false); }}
                            className={`p-4 rounded-2xl cursor-pointer transition-all flex items-center gap-4 ${activeModule.id === m.id ? 'bg-accent-gold/20 border border-accent-gold/40' : 'hover:bg-white/5 border border-transparent'}`}
                           >
                               <span className="text-xl">{m.icon}</span>
                               <span className={`font-bold text-sm ${activeModule.id === m.id ? 'text-accent-gold' : 'text-text-muted'}`}>{m.title}</span>
                           </div>
                       ))}
                   </div>

                   <div className="mt-20 p-6 glass-panel rounded-3xl text-center border-accent-gold/20">
                       <Trophy className="mx-auto text-accent-gold mb-3" size={32} />
                       <p className="text-xs font-bold mb-1">Rank: Novice Scholar</p>
                       <div className="w-full bg-white/10 h-1 rounded-full overflow-hidden">
                           <div className="w-1/3 bg-accent-gold h-full" />
                       </div>
                   </div>
                </aside>

                {/* Center: Content & Chat */}
                <div className="flex-1 flex flex-col gap-8">
                    {/* Active Module Info */}
                    <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="glass-panel p-8 rounded-[2.5rem]">
                        <div className="flex items-center gap-4 mb-4">
                            <span className="text-4xl">{activeModule.icon}</span>
                            <div>
                                <h2 className="text-4xl font-display font-bold">{activeModule.title}</h2>
                                <p className="text-accent-gold text-xs font-mono uppercase tracking-widest mt-1">Foundational Module</p>
                            </div>
                        </div>
                        <p className="text-text-muted italic mb-6 leading-relaxed">"{activeModule.description}"</p>
                        
                        <div className="flex flex-wrap gap-4">
                            {activeModule.quizzes.map(q => (
                                <button key={q.id} onClick={() => setActiveQuiz(q)} className="glass-card px-6 py-3 rounded-xl flex items-center gap-3 text-sm font-bold text-accent-gold group">
                                    <Sparkles size={16} className="group-hover:rotate-12 transition-transform" /> {q.title}
                                </button>
                            ))}
                        </div>
                    </motion.div>

                    {/* Academic AI Assistant */}
                    <div className="flex-1 glass-panel rounded-[2.5rem] flex flex-col overflow-hidden min-h-[500px]">
                        <div className="p-6 border-b border-border-subtle flex items-center justify-between bg-bg-panel/50">
                            <div className="flex items-center gap-3">
                                <Bot className="text-accent-gold" />
                                <span className="font-bold text-sm tracking-widest">GEMINI ACADEMIC HUB</span>
                            </div>
                        </div>
                        
                        <div className="flex-1 p-6 overflow-y-auto space-y-6">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] p-4 rounded-2xl ${m.role === 'user' ? 'bg-accent-gold text-bg-dark font-medium' : 'bg-white/5 border border-border-subtle shadow-lg'}`}>
                                        <div className="markdown-body">
                                            <Markdown>{m.content}</Markdown>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="p-6 border-t border-border-subtle bg-bg-panel/30">
                            <div className="relative flex items-center gap-3">
                                <input 
                                    value={input} onChange={e => setInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && sendMessage()}
                                    placeholder="Consult the Grand Scholar's database..."
                                    className="flex-1 bg-bg-dark border border-border-subtle rounded-2xl py-4 px-6 focus:outline-none focus:border-accent-gold transition-all"
                                />
                                <button onClick={sendMessage} className="p-4 bg-accent-gold rounded-2xl text-bg-dark hover:scale-110 active:scale-95 transition-all">
                                    <Send size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                {/* Right: Resources & Stats (Desktop Only) */}
                <aside className="hidden xl:block w-72 space-y-8">
                    <div className="glass-panel p-6 rounded-3xl">
                        <h4 className="text-xs font-bold uppercase tracking-widest text-accent-gold mb-4">Latest Archives</h4>
                        <div className="space-y-4">
                            {['Morphology.pdf', 'BritishHistory_S2.docx', 'Composition_Lab_01'].map(f => (
                                <div key={f} className="flex items-center gap-3 text-xs hover:text-accent-gold cursor-pointer transition-all">
                                    <ExternalLink size={14} className="opacity-50" /> {f}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="glass-panel p-6 rounded-3xl bg-gradient-to-br from-accent-gold/5 to-transparent">
                        <Sparkles className="text-accent-gold mb-3" />
                        <h4 className="text-sm font-bold mb-2">Did you know?</h4>
                        <p className="text-[11px] text-text-muted leading-relaxed italic">
                            The library of FLSHM contains over 50,000 physical volumes helping scholars achieve excellence since 1987.
                        </p>
                    </div>
                </aside>
              </main>

              <Footer />

              {/* Quiz Modal */}
              <AnimatePresence>
                {activeQuiz && (
                    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-bg-dark/90 text-center backdrop-blur-xl">
                        <motion.div initial={{ y: 50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 50, opacity: 0 }} className="glass-panel w-full max-w-2xl p-10 rounded-[3rem]">
                            <h2 className="text-3xl font-display font-bold mb-8 text-accent-gold">{activeQuiz.title}</h2>
                            <div className="space-y-8">
                                {activeQuiz.questions.slice(0, 1).map((q, idx) => (
                                    <div key={idx} className="text-left bg-white/5 p-8 rounded-3xl">
                                        <p className="text-xl mb-6 font-serif">"{q.text}"</p>
                                        <div className="grid gap-4">
                                            {q.options.map((opt, i) => (
                                                <button key={i} onClick={() => { if(i === q.answer) { confetti(); playSound('relic'); } else { playSound('error'); } setActiveQuiz(null); }} className="w-full text-left p-4 rounded-xl border border-border-subtle hover:bg-accent-gold/10 hover:border-accent-gold transition-all text-sm">
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </motion.div>
                    </div>
                )}
              </AnimatePresence>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- External Babel for JSX Processing in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
